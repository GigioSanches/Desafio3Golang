services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
      POSTGRES_DB: orderdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderuser -d orderdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://orderuser:orderpass@db:5432/orderdb?sslmode=disable", "up"]

  app:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DB_DSN: "host=db user=orderuser password=orderpass dbname=orderdb port=5432 sslmode=disable"
    ports:
      - "8080:8080" # REST
      - "50051:50051" # gRPC
      - "8081:8081" # GraphQL

volumes:
  pgdata:
